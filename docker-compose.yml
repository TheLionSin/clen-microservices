services:
  postgres:
    image: postgres:16-alpine
    container_name: clen_postgres
    environment:
      POSTGRES_USER: clen_user
      POSTGRES_PASSWORD: clenshop
      POSTGRES_DB: clen_catalog
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: clen_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: clen_admin
      MINIO_ROOT_PASSWORD: clenshop
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clen_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped


volumes:
  pgdata:
  minio_data:
  redis_data:

