services:
  postgres:
    image: postgres:16-alpine
    container_name: clen_postgres
    environment:
      POSTGRES_USER: clen_user
      POSTGRES_PASSWORD: clenshop
      POSTGRES_DB: clen_catalog
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: clen_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: clen_admin
      MINIO_ROOT_PASSWORD: clenshop
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clen_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped


  kafka:
    image: apache/kafka:3.7.0
    container_name: clen_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT_INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka


  api-gateway:
    build: ./api-gateway
    container_name: clen_api_gateway
    ports:
      - "8080:8080"
    environment:
      - CATALOG_URL=http://catalog-service:8081
      - ORDER_URL=http://order-service:8082
      - USER_URL=http://user-service:8083
    depends_on:
      - catalog-service
      - order-service
      - user-service
    restart: unless-stopped

  catalog-service:
    build: ./catalog-service
    container_name: clen_catalog_service
    environment:
      - PG_URL=postgres://clen_user:clenshop@postgres:5432/clen_catalog?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - postgres
      - kafka
      - minio
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: clen_user_service
    environment:
      - PG_URL=postgres://clen_user:clenshop@postgres:5432/clen_users?sslmode=disable
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: clen_order_service
    environment:
      - PG_URL=postgres://clen_user:clenshop@postgres:5432/clen_orders?sslmode=disable
      - REDIS_URL=redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CATALOG_GRPC_URL=catalog-service:50051
    depends_on:
      - postgres
      - redis
      - kafka
      - catalog-service
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: clen_notification_service
    environment:
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      - kafka
    restart: unless-stopped



volumes:
  pgdata:
  minio_data:
  redis_data:
  kafka_data:
